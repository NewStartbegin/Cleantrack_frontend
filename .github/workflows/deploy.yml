name: Frontend CI/CD

on:
  pull_request:
    branches: [main] # Sesuaikan jadi 'main' kalau branch utama lu main
    paths:
      - 'cleantrack-frontend/**'
      - '.github/workflows/deploy.yml'
  push:
    branches: [main]
    paths:
      - 'cleantrack-frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: EC2_UTS
  cancel-in-progress: true

jobs:
  ci:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          # Jurus sakti biar gak error path: nyari otomatis di mana pun package-lock berada
          cache-dependency-path: "**/package-lock.json"

      - name: Install dependencies
        working-directory: cleantrack-frontend
        run: npm ci

      - name: Build
        working-directory: cleantrack-frontend
        env:
          VITE_BASE_PATH: /
          VITE_API_BASE_URL: /api
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: cleantrack-frontend/dist

  cd:
    name: Deploy Frontend (EC2)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/main')
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Upload dist to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist/*"
          target: "/home/${{ secrets.EC2_USERNAME }}/frontend-dist"
          strip_components: 1

      - name: Deploy files on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            # Pastikan folder target ada
            sudo mkdir -p /var/www/html
            # Bersihkan folder lama
            sudo rm -rf /var/www/html/*
            # Copy file baru dari tempat transit ke folder Nginx
            sudo cp -r /home/${{ secrets.EC2_USERNAME }}/frontend-dist/* /var/www/html/
            # Set owner agar Nginx bisa baca filenya
            sudo chown -R www-data:www-data /var/www/html