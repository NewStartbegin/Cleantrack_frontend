name: Frontend CI/CD

on:
  pull_request:
    branches: [main]
    # Hapus path spesifik jika kode ada di root, atau ganti sesuai kebutuhan
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: EC2_UTS
  cancel-in-progress: true

jobs:
  ci:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: "**/package-lock.json"

      - name: Install dependencies
        # Hapus working-directory karena file package.json ada di root
        run: npm ci

      - name: Build
        # Hapus working-directory
        env:
          VITE_BASE_PATH: /
          VITE_API_BASE_URL: /api
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          # Karena build dilakukan di root, folder dist langsung ada di root
          path: dist

  cd:
    name: Deploy Frontend (EC2)
    # Perbaikan logic: github.ref == 'refs/heads/main' ditulis 2x sebelumnya, cukup 1x
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Upload dist to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist/*"
          target: "/home/${{ secrets.EC2_USERNAME }}/frontend-dist"
          strip_components: 1

      - name: Deploy files on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            # Pastikan folder target ada
            sudo mkdir -p /var/www/html
            # Bersihkan folder lama
            sudo rm -rf /var/www/html/*
            # Copy file baru dari tempat transit ke folder Nginx
            sudo cp -r /home/${{ secrets.EC2_USERNAME }}/frontend-dist/* /var/www/html/
            # Set owner agar Nginx bisa baca filenya
            sudo chown -R www-data:www-data /var/www/html